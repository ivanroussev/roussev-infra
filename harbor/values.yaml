harbor:
  expose:
    type: ingress
    tls:
      enabled: true
      certSource: secret
      secret:
        secretName: harbor-tls
    ingress:
      hosts:
        core: harbor.roussev.com
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      labels: {}
  externalURL: https://harbor.roussev.com
  persistence:
    enabled: true
    resourcePolicy: "keep"
    persistentVolumeClaim:
      registry:
        storageClass: local-path
        subPath: ""
        accessMode: ReadWriteOnce
        size: 5Gi
        annotations: {}
      jobservice:
        jobLog:
          existingClaim: ""
          storageClass: local-path
          subPath: ""
          accessMode: ReadWriteOnce
          size: 1Gi
          annotations: {}
      database:
        existingClaim: ""
        storageClass: local-path
        subPath: ""
        accessMode: ReadWriteOnce
        size: 1Gi
        annotations: {}
      redis:
        existingClaim: ""
        storageClass: local-path
        subPath: ""
        accessMode: ReadWriteOnce
        size: 1Gi
        annotations: {}
      trivy:
        existingClaim: ""
        storageClass: local-path
        subPath: ""
        accessMode: ReadWriteOnce
        size: 5Gi
        annotations: {}

  ipFamily:
    ipv6:
      enabled: false
    ipv4:
      enabled: true

  imagePullSecrets:
  updateStrategy:
    type: Recreate

  logLevel: info