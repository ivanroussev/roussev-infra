kube-prometheus-stack:
  grafana:
    enabled: true

    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
      hosts:
        - grafana.roussev.com
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.roussev.com

    persistence:
      enabled: true
      size: 2Gi
      storageClassName: local-path

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

    adminUser: admin
    adminPassword: ""

    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL
        label: grafana_dashboard
        folderAnnotation: grafana_folder
        provider:
          foldersFromFilesStructure: true
      datasources:
        enabled: true
        searchNamespace: ALL

    grafana.ini:
      server:
        root_url: https://grafana.roussev.com
      users:
        allow_sign_up: false
        allow_org_create: false
      auth:
        disable_login_form: false
      auth.anonymous:
        enabled: true
        org_role: Viewer
      security:
        allow_embedding: false
        cookie_secure: true
        strict_transport_security: true
        content_security_policy: true
      analytics:
        reporting_enabled: false
        check_for_updates: false

  prometheus:
    enabled: true

    ingress:
      enabled: false

    prometheusSpec:
      retention: 7d
      retentionSize: "4GB"

      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi

      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false

      externalLabels:
        cluster: roussev-homelab

      securityContext:
        runAsNonRoot: true
        fsGroup: 65534


  alertmanager:
    enabled: true

    ingress:
      enabled: false

    alertmanagerSpec:
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          memory: 64Mi

      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi

    config:
      global:
        resolve_timeout: 5m
      route:
        receiver: "null"
        group_by: ["alertname", "namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        routes:
          - matchers:
              - alertname = "Watchdog"
            receiver: "null"
          - matchers:
              - severity = "critical"
            receiver: "null"
      receivers:
        - name: "null"

  prometheusOperator:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

  kube-state-metrics:
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        memory: 64Mi

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 25m
        memory: 16Mi
      limits:
        memory: 32Mi

  defaultRules:
    create: true
    rules:
      alertmanager: true
      etcd: true
      configReloaders: true
      general: true
      k8sContainerCpuUsageSecondsTotal: true
      k8sContainerMemoryCache: true
      k8sContainerMemoryRss: true
      k8sContainerMemorySwap: true
      k8sContainerMemoryWorkingSetBytes: true
      k8sPodOwner: true
      kubeApiserverAvailability: true
      kubeApiserverBurnrate: true
      kubeApiserverHistogram: true
      kubeApiserverSlos: true
      kubeControllerManager: true
      kubelet: true
      kubeProxy: true
      kubePrometheusGeneral: true
      kubePrometheusNodeRecording: true
      kubernetesApps: true
      kubernetesResources: true
      kubernetesStorage: true
      kubernetesSystem: true
      kubeSchedulerAlerting: true
      kubeSchedulerRecording: true
      kubeStateMetrics: true
      network: true
      node: true
      nodeExporterAlerting: true
      nodeExporterRecording: true
      prometheus: true
      prometheusOperator: true
      windows: false

  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
  kubeEtcd:
    enabled: false
